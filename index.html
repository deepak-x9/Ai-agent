<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programming Q&A AI Assistant</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Programming Q&A AI Assistant</h1>
        <div class="actions">
          <button id="newChatBtn" class="secondary">New Chat</button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <div id="loading" class="loading hidden">AI is thinking...</div>

      <form id="chatForm" class="chat-form">
        <textarea
          id="messageInput"
          placeholder="Ask about Python, Java, C++, JavaScript, SQL..."
          rows="3"
          required
        ></textarea>
        <button type="submit" id="sendBtn">Send</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
